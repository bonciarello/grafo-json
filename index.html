  <style>
    /* ============================================================
       CSS Custom Properties — Light theme (default)
       ============================================================ */
    :root {
      --color-bg: #F7F8FA;
      --color-surface: #FFFFFF;
      --color-primary: #2563EB;
      --color-primary-soft: #EFF4FF;
      --color-primary-hover: #1D4ED8;
      --color-accent: #7C3AED;
      --color-accent-soft: #F5F3FF;
      --color-success: #059669;
      --color-danger: #DC2626;
      --color-warning: #D97706;

      --color-text: #0F172A;
      --color-text-secondary: #475569;
      --color-text-muted: #94A3B8;
      --color-border: #E2E8F0;
      --color-border-light: #F1F5F9;

      --color-node-key: #2563EB;
      --color-node-key-bg: #DBEAFE;
      --color-node-key-stroke: #BFDBFE;
      --color-node-value: #7C3AED;
      --color-node-value-bg: #EDE9FE;
      --color-node-value-stroke: #DDD6FE;
      --color-node-primitive: #059669;
      --color-node-primitive-bg: #D1FAE5;
      --color-node-primitive-stroke: #A7F3D0;
      --color-link: #CBD5E1;
      --color-link-highlight: #2563EB;

      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
    }

    /* Dark theme */
    [data-theme="dark"] {
      --color-bg: #0F172A;
      --color-surface: #1E293B;
      --color-primary: #60A5FA;
      --color-primary-soft: #1E3A5F;
      --color-primary-hover: #93BBFD;
      --color-accent: #A78BFA;
      --color-accent-soft: #2E2456;
      --color-success: #34D399;
      --color-danger: #F87171;
      --color-warning: #FBBF24;

      --color-text: #F1F5F9;
      --color-text-secondary: #94A3B8;
      --color-text-muted: #64748B;
      --color-border: #334155;
      --color-border-light: #1E293B;

      --color-node-key: #60A5FA;
      --color-node-key-bg: #1E3A5F;
      --color-node-key-stroke: #2563EB;
      --color-node-value: #A78BFA;
      --color-node-value-bg: #2E2456;
      --color-node-value-stroke: #7C3AED;
      --color-node-primitive: #34D399;
      --color-node-primitive-bg: #064E3B;
      --color-node-primitive-stroke: #059669;
      --color-link: #334155;
      --color-link-highlight: #60A5FA;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.20);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.30);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.40);
    }

    /* ============================================================
       Reset & Base
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      color: var(--color-text);
      background: var(--color-bg);
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ============================================================
       Focus & Reduced Motion
       ============================================================ */
    :focus-visible {
      outline: 2.5px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================
       Header
       ============================================================ */
    .app-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 var(--space-4);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      color: var(--color-primary);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--color-text);
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .btn-icon:hover {
      background: var(--color-border-light);
      color: var(--color-text);
      border-color: var(--color-text-muted);
    }

    .btn-icon svg { width: 18px; height: 18px; }

    /* ============================================================
       Main Area
       ============================================================ */
    .app-main {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       Upload Zone — The "Lens" signature element
       ============================================================ */
    .upload-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .upload-zone.drag-over {
      background: var(--color-primary-soft);
    }

    .lens {
      position: relative;
      width: 264px;
      height: 264px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lens-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--color-primary);
      opacity: 0;
      animation: lens-pulse 3.2s ease-out infinite;
      pointer-events: none;
    }

    .lens-ring-1 { width: 100%; height: 100%; animation-delay: 0s; }
    .lens-ring-2 { width: 72%; height: 72%; animation-delay: 0.6s; }
    .lens-ring-3 { width: 48%; height: 48%; animation-delay: 1.2s; }

    @keyframes lens-pulse {
      0%   { transform: scale(0.75); opacity: 0.35; }
      100% { transform: scale(1.45); opacity: 0; }
    }

    .lens-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--space-3);
      background: var(--color-surface);
      border-radius: 50%;
      width: 120px;
      height: 120px;
      justify-content: center;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--color-border);
    }

    .lens-center svg {
      width: 32px;
      height: 32px;
      color: var(--color-primary);
    }

    .lens-center h1 {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--color-text);
      max-width: 100px;
    }

    .lens-subtitle {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }

    .lens-subtitle button {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 2px 0;
      font-family: var(--font-body);
    }

    .lens-subtitle button:hover {
      color: var(--color-primary-hover);
    }

    /* ============================================================
       Graph View (when file loaded)
       ============================================================ */
    .graph-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Controls bar */
    .controls-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
      min-height: 48px;
      z-index: 5;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex: 1;
      min-width: 0;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
      height: 36px;
    }

    .btn:hover {
      background: var(--color-border-light);
      border-color: var(--color-text-muted);
    }

    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-sm {
      font-size: 12px;
      padding: 4px 8px;
      height: 32px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0 var(--space-3);
      height: 36px;
      flex: 1;
      max-width: 300px;
      min-width: 140px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .filter-group:focus-within {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-soft);
    }

    .filter-group svg {
      width: 15px;
      height: 15px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .filter-group input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text);
      outline: none;
      min-width: 0;
    }

    .filter-group input::placeholder {
      color: var(--color-text-muted);
    }

    .node-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: var(--space-3);
      left: var(--space-4);
      display: flex;
      gap: var(--space-4);
      z-index: 4;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      box-shadow: var(--shadow-sm);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--color-text-secondary);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-dot-key { background: var(--color-node-key); }
    .legend-dot-value { background: var(--color-node-value); }

    /* Graph container */
    .graph-container {
      flex: 1;
      overflow: hidden;
      background: var(--color-bg);
      position: relative;
    }

    .graph-container svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Grid pattern on graph background */
    .graph-bg-pattern {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        radial-gradient(circle, var(--color-border) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    [data-theme="dark"] .graph-bg-pattern {
      opacity: 0.2;
    }

    /* ============================================================
       Error Toast
       ============================================================ */
    .error-toast {
      position: fixed;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      color: #991B1B;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      max-width: 90vw;
      animation: toast-in 0.25s ease-out;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .error-toast button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #991B1B;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }

    /* ============================================================
       Graph SVG Node & Link Styles
       ============================================================ */
    .graph-svg {
      font-family: var(--font-mono);
    }

    .node-group {
      cursor: grab;
      transition: opacity 0.25s ease;
    }

    .node-group:active {
      cursor: grabbing;
    }

    .node-group.filtered-out {
      opacity: 0.08;
      pointer-events: none;
    }

    .node-rect {
      transition: fill 0.2s ease, stroke 0.2s ease, filter 0.2s ease;
    }

    .node-group:hover .node-rect {
      filter: brightness(0.94);
    }

    .node-group.key-node .node-rect {
      fill: var(--color-node-key-bg);
      stroke: var(--color-node-key-stroke);
      stroke-width: 1.5;
    }

    .node-group.value-node .node-rect {
      fill: var(--color-node-value-bg);
      stroke: var(--color-node-value-stroke);
      stroke-width: 1.5;
    }

    .node-group.primitive-node .node-rect {
      fill: var(--color-node-primitive-bg);
      stroke: var(--color-node-primitive-stroke);
      stroke-width: 1.5;
    }

    .node-label {
      font-size: 11px;
      font-weight: 500;
      fill: var(--color-text);
      pointer-events: none;
      user-select: none;
      dominant-baseline: central;
      text-anchor: middle;
    }

    [data-theme="dark"] .node-label {
      fill: var(--color-text);
    }

    .link-line {
      stroke: var(--color-link);
      stroke-width: 1.5;
      fill: none;
      transition: stroke 0.25s ease, opacity 0.25s ease;
    }

    .link-line.filtered-out {
      opacity: 0.06;
    }

    .link-line.highlighted {
      stroke: var(--color-link-highlight);
      stroke-width: 2.5;
    }

    /* ============================================================
       Footer
       ============================================================ */
    .app-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 640px) {
      .app-header { padding: 0 var(--space-3); height: 44px; }
      .logo-text { font-size: 16px; }
      .controls-bar { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
      .controls-left { gap: var(--space-2); }
      .filter-group { max-width: none; }
      .btn { font-size: 12px; padding: 4px 8px; }
      .legend { bottom: var(--space-2); left: var(--space-2); padding: 4px 10px; gap: var(--space-2); }
      .legend-item { font-size: 10px; }
      .lens { width: 220px; height: 220px; }
      .lens-center { width: 100px; height: 100px; }
      .lens-center h1 { font-size: 12px; max-width: 80px; }
    }

    @media (max-width: 400px) {
      .logo-text { font-size: 14px; }
      .controls-bar { flex-direction: column; align-items: stretch; }
      .controls-left { flex-wrap: wrap; }
      .controls-right { justify-content: flex-end; }
      .filter-group { max-width: none; width: 100%; }
    }
  </style>
</head>

        @dragleave.prevent="onDragLeave"
        @drop.prevent="onDrop"
        @click="openFilePicker"
        role="button"
        tabindex="0"
        aria-label="Carica un file JSON — clicca o trascina qui"
        @keydown.enter="openFilePicker"
        @keydown.space.prevent="openFilePicker"
      >
        <div class="lens">
          <div class="lens-ring lens-ring-1"></div>
          <div class="lens-ring lens-ring-2"></div>
          <div class="lens-ring lens-ring-3"></div>
          <div class="lens-center">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <h1>Trascina qui il tuo JSON</h1>
          </div>
        </div>
        <p class="lens-subtitle" style="position:absolute;bottom:40px;text-align:center;">
          oppure <button type="button" @click.stop="openFilePicker">sfoglia i file</button>
        </p>
        <input
          type="file"
          ref="fileInput"
          accept=".json,application/json"
          @change="handleFileSelect"
          hidden
          aria-hidden="true"
        >
      </div>

      <!-- ============================================================
           Graph View (shown when a file is loaded)
           ============================================================ -->
      <div v-else class="graph-view">

        <!-- Controls bar -->
        <div class="controls-bar">
          <div class="controls-left">
            <button class="btn btn-sm" @click="openFilePicker" :title="fileName">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              </svg>
              <span class="file-name-label">{{ fileName }}</span>
            </button>
            <div class="filter-group">
              <label for="filter-input" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Filtra nodi</label>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                id="filter-input"
                v-model="filterText"
                type="text"
                placeholder="Filtra per nome…"
                @input="applyFilter"
                autocomplete="off"
                spellcheck="false"
              >
            </div>
          </div>
          <div class="controls-right">
            <span class="node-count" aria-live="polite">{{ visibleNodeCount }} / {{ totalNodeCount }} nodi</span>
            <button class="btn btn-sm" @click="resetZoom" title="Reimposta zoom" aria-label="Reimposta zoom">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
            </button>
            <button class="btn btn-sm" @click="zoomToFit" title="Adatta alla vista" aria-label="Adatta grafo alla vista">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
              </svg>
            </button>
          </div>
          <input
            type="file"
            ref="fileInput"
            accept=".json,application/json"
            @change="handleFileSelect"
            hidden
            aria-hidden="true"
          >
        </div>

        <!-- Graph container -->
        <div class="graph-container" ref="graphContainer">
          <div class="graph-bg-pattern" aria-hidden="true"></div>
        </div>

        <!-- Legend -->
        <div class="legend" aria-label="Legenda tipi di nodo">
          <span class="legend-item"><span class="legend-dot legend-dot-key"></span> chiave</span>
          <span class="legend-item"><span class="legend-dot legend-dot-value"></span> valore</span>
        </div>
      </div>

      <!-- ============================================================
           Error Toast
           ============================================================ -->
      <transition name="toast">
        <div v-if="errorMsg" class="error-toast" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ errorMsg }}</span>
          <button @click="errorMsg = null" aria-label="Chiudi notifica errore">&times;</button>
        </div>
      </transition>

    </main>

    <!-- ============================================================
         Footer
         ============================================================ -->
    <footer class="app-footer">
      <span>Dependency Lens &mdash; JSON dependency graph explorer</span>
    </footer>

  </div><!-- /#app -->

  <!-- ============================================================
       Vendor Scripts
       ============================================================ -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
  </script>
  <script src="https://d3js.org/d3.v7.min.js">
  </script>

  <!-- ============================================================
       Application Script
       ============================================================ -->
  <script>
  (function() {
    'use strict';

    const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

    // ============================================================
    // JSON Parser — Flattens nested JSON into nodes & links
    // ============================================================
    function parseJSONToGraph(jsonObj) {
      const nodes = [];
      const links = [];
      const nodeMap = new Map();
      const linkSet = new Set();
      let idCounter = 0;

      function makeId() {
        return 'n' + (idCounter++);
      }

      function getOrCreateNode(label, type, path) {
        const key = path + '|' + type + '|' + label;
        if (nodeMap.has(key)) {
          return nodeMap.get(key);
        }
        const id = makeId();
        const node = { id, label, type, path };
        nodeMap.set(key, node);
        nodes.push(node);
        return node;
      }

      function addLink(sourceId, targetId) {
        const linkKey = sourceId + '->' + targetId;
        if (!linkSet.has(linkKey)) {
          linkSet.add(linkKey);
          links.push({ source: sourceId, target: targetId });
        }
      }

      function traverse(obj, parentNode, currentPath) {
        if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) return;

        for (const [key, value] of Object.entries(obj)) {
          const keyPath = currentPath ? currentPath + '.' + key : key;

          const keyNode = getOrCreateNode(key, 'key', keyPath);

          if (parentNode) {
            addLink(parentNode.id, keyNode.id);
          }

          if (typeof value === 'string') {
            const valNode = getOrCreateNode(value, 'value', keyPath + ':val');
            addLink(keyNode.id, valNode.id);
          } else if (typeof value === 'number' || typeof value === 'boolean') {
            const valNode = getOrCreateNode(String(value), 'primitive', keyPath + ':val');
            addLink(keyNode.id, valNode.id);
          } else if (value !== null && typeof value === 'object' && !Array.isArray(value)) {
            traverse(value, keyNode, keyPath);
          } else if (Array.isArray(value)) {
            // For arrays, create a synthetic node and recurse into items
            const arrNode = getOrCreateNode('[' + value.length + ']', 'key', keyPath + ':arr');
            addLink(keyNode.id, arrNode.id);
            value.forEach((item, idx) => {
              if (typeof item === 'string') {
                const itemNode = getOrCreateNode(item, 'value', keyPath + '[' + idx + ']');
                addLink(arrNode.id, itemNode.id);
              } else if (item !== null && typeof item === 'object' && !Array.isArray(item)) {
                traverse(item, arrNode, keyPath + '[' + idx + ']');
              }
            });
          }
          // null/undefined values are ignored
        }
      }

      traverse(jsonObj, null, '');
      return { nodes, links };
    }

    // ============================================================
    // D3 Graph Manager
    // ============================================================
    class GraphManager {
      constructor(containerEl) {
        this.container = containerEl;
        this.svg = null;
        this.simulation = null;
        this.zoomBehavior = null;
        this.mainGroup = null;
        this.linksGroup = null;
        this.nodesGroup = null;

        this.nodes = [];
        this.links = [];
        this.nodeElements = null;
        this.linkElements = null;

        this.width = 0;
        this.height = 0;
        this.filterText = '';
        this.initialized = false;

        // Bound handlers
        this._onResize = this._onResize.bind(this);
      }

      init() {
        if (this.initialized) return;

        const rect = this.container.getBoundingClientRect();
        this.width = rect.width;
        this.height = rect.height;

        // Create SVG
        this.svg = d3.select(this.container)
          .append('svg')
          .attr('class', 'graph-svg')
          .attr('width', this.width)
          .attr('height', this.height);

        // Define arrow markers
        const defs = this.svg.append('defs');

        defs.append('marker')
          .attr('id', 'arrowhead')
          .attr('viewBox', '0 0 10 7')
          .attr('refX', 16)
          .attr('refY', 3.5)
          .attr('markerWidth', 7)
          .attr('markerHeight', 5)
          .attr('orient', 'auto')
          .append('polygon')
          .attr('points', '0 0, 10 3.5, 0 7')
          .attr('fill', 'var(--color-link)');

        defs.append('marker')
          .attr('id', 'arrowhead-highlight')
          .attr('viewBox', '0 0 10 7')
          .attr('refX', 16)
          .attr('refY', 3.5)
          .attr('markerWidth', 7)
          .attr('markerHeight', 5)
          .attr('orient', 'auto')
          .append('polygon')
          .attr('points', '0 0, 10 3.5, 0 7')
          .attr('fill', 'var(--color-link-highlight)');

        // Zoom layer
        this.mainGroup = this.svg.append('g').attr('class', 'zoom-layer');

        // Zoom behavior
        this.zoomBehavior = d3.zoom()
          .scaleExtent([0.1, 4])
          .on('zoom', (event) => {
            this.mainGroup.attr('transform', event.transform);
          });

        this.svg.call(this.zoomBehavior);

        // Links group
        this.linksGroup = this.mainGroup.append('g').attr('class', 'links-group');
        // Nodes group
        this.nodesGroup = this.mainGroup.append('g').attr('class', 'nodes-group');

        // Resize observer
        this.resizeObserver = new ResizeObserver(this._onResize);
        this.resizeObserver.observe(this.container);

        this.initialized = true;
      }

      _onResize() {
        const rect = this.container.getBoundingClientRect();
        if (rect.width === this.width && rect.height === this.height) return;
        this.width = rect.width;
        this.height = rect.height;
        this.svg.attr('width', this.width).attr('height', this.height);
        if (this.simulation) {
          this.simulation.force('center', d3.forceCenter(this.width / 2, this.height / 2));
          this.simulation.alpha(0.3).restart();
        }
      }

      setData(rawNodes, rawLinks) {
        // Deep copy to avoid mutation issues with D3
        this.nodes = rawNodes.map(n => ({ ...n, x: undefined, y: undefined, vx: undefined, vy: undefined }));
        this.links = rawLinks.map(l => ({ source: l.source, target: l.target }));

        // Restart simulation
        this._restartSimulation();
        this.applyFilter();
      }

      _restartSimulation() {
        // Stop previous simulation
        if (this.simulation) {
          this.simulation.stop();
        }

        // Create simulation
        this.simulation = d3.forceSimulation(this.nodes)
          .force('link', d3.forceLink(this.links).id(d => d.id).distance(120))
          .force('charge', d3.forceManyBody().strength(-400))
          .force('center', d3.forceCenter(this.width / 2, this.height / 2))
          .force('collide', d3.forceCollide().radius(40))
          .alphaDecay(0.02)
          .on('tick', () => this._onTick());

        // Render
        this._render();
      }

      _render() {
        const self = this;

        // --- Links ---
        this.linkElements = this.linksGroup
          .selectAll('line')
          .data(this.links, d => d.source.id + '->' + d.target.id);

        this.linkElements.exit().remove();

        const linkEnter = this.linkElements.enter()
          .append('line')
          .attr('class', 'link-line')
          .attr('marker-end', 'url(#arrowhead)');

        this.linkElements = linkEnter.merge(this.linkElements);

        // --- Nodes ---
        this.nodeElements = this.nodesGroup
          .selectAll('g.node-group')
          .data(this.nodes, d => d.id);

        this.nodeElements.exit().remove();

        const nodeEnter = this.nodeElements.enter()
          .append('g')
          .attr('class', d => 'node-group ' + d.type + '-node')
          .call(this._createDragBehavior());

        // Rect
        nodeEnter.append('rect')
          .attr('class', 'node-rect')
          .attr('rx', 5)
          .attr('ry', 5);

        // Label
        nodeEnter.append('text')
          .attr('class', 'node-label');

        // Tooltip
        nodeEnter.append('title');

        this.nodeElements = nodeEnter.merge(this.nodeElements);

        // Update node visuals
        this.nodeElements.select('title')
          .text(d => d.label + (d.path ? '  [' + d.path + ']' : ''));

        this.nodeElements.select('.node-label')
          .text(d => this._truncate(d.label, 24));

        // Compute rect dimensions
        this.nodeElements.each(function(d) {
          const textEl = d3.select(this).select('.node-label');
          const bbox = textEl.node().getBBox();
          const w = Math.max(48, Math.min(220, bbox.width + 16));
          const h = 26;
          d._width = w;
          d._height = h;
          d3.select(this).select('.node-rect')
            .attr('width', w)
            .attr('height', h)
            .attr('x', -w / 2)
            .attr('y', -h / 2);
        });
      }

      _onTick() {
        if (this.linkElements) {
          this.linkElements
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        }

        if (this.nodeElements) {
          this.nodeElements
            .attr('transform', d => {
              // Constrain to container bounds
              const r = 60;
              d.x = Math.max(r, Math.min(this.width - r, d.x));
              d.y = Math.max(r, Math.min(this.height - r, d.y));
              return 'translate(' + d.x + ',' + d.y + ')';
            });
        }
      }

      _createDragBehavior() {
        const self = this;
        return d3.drag()
          .on('start', (event, d) => {
            if (!event.active && self.simulation) {
              self.simulation.alphaTarget(0.3).restart();
            }
            d.fx = d.x;
            d.fy = d.y;
          })
          .on('drag', (event, d) => {
            d.fx = event.x;
            d.fy = event.y;
          })
          .on('end', (event, d) => {
            if (!event.active && self.simulation) {
              self.simulation.alphaTarget(0);
            }
            // Keep node pinned where dropped
            d.fx = d.x;
            d.fy = d.y;
          });
      }

      applyFilter(text) {
        this.filterText = (text || '').toLowerCase().trim();

        if (!this.nodeElements) return;

        const filter = this.filterText;

        // Determine visibility per node
        const visibleNodes = new Set();
        this.nodes.forEach(n => {
          if (!filter || n.label.toLowerCase().includes(filter)) {
            visibleNodes.add(n.id);
          }
        });

        // Update node visibility
        this.nodeElements
          .classed('filtered-out', d => !visibleNodes.has(d.id));

        // Update link visibility
        if (this.linkElements) {
          this.linkElements
            .classed('filtered-out', d => {
              return !visibleNodes.has(d.source.id) || !visibleNodes.has(d.target.id);
            });
        }

        // Optionally restart simulation to re-layout visible nodes
        if (filter && this.simulation) {
          this.simulation.alpha(0.15).restart();
        }
      }

      resetZoom() {
        if (this.svg && this.zoomBehavior) {
          this.svg.transition().duration(400).call(
            this.zoomBehavior.transform,
            d3.zoomIdentity
          );
        }
      }

      zoomToFit() {
        if (!this.svg || !this.nodeElements || this.nodes.length === 0) return;

        const padding = 60;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

        this.nodes.forEach(n => {
          if (n.x !== undefined) {
            minX = Math.min(minX, n.x);
            minY = Math.min(minY, n.y);
            maxX = Math.max(maxX, n.x);
            maxY = Math.max(maxY, n.y);
          }
        });

        if (!isFinite(minX)) return;

        const dx = maxX - minX || 1;
        const dy = maxY - minY || 1;
        const scale = Math.min(
          (this.width - padding * 2) / dx,
          (this.height - padding * 2) / dy,
          2.5
        );
        const tx = this.width / 2 - scale * (minX + maxX) / 2;
        const ty = this.height / 2 - scale * (minY + maxY) / 2;

        this.svg.transition().duration(500).call(
          this.zoomBehavior.transform,
          d3.zoomIdentity.translate(tx, ty).scale(scale)
        );
      }

      _truncate(text, maxLen) {
        if (text.length <= maxLen) return text;
        return text.substring(0, maxLen - 1) + '\u2026';
      }

      destroy() {
        if (this.simulation) this.simulation.stop();
        if (this.resizeObserver) this.resizeObserver.disconnect();
        if (this.svg) {
          this.svg.selectAll('*').remove();
          this.svg.remove();
        }
        this.initialized = false;
      }
    }

    // ============================================================
    // Vue Application
    // ============================================================
    createApp({
      setup() {
        // --- State ---
        const fileLoaded = ref(false);
        const fileName = ref('');
        const filterText = ref('');
        const errorMsg = ref(null);
        const isDragOver = ref(false);

        const parsedNodes = ref([]);
        const parsedLinks = ref([]);
        const totalNodeCount = ref(0);
        const visibleNodeCount = ref(0);

        const isDark = ref(false);

        // --- Refs ---
        const fileInput = ref(null);
        const graphContainer = ref(null);

        // --- Graph Manager ---
        let graphManager = null;
        let dragCounter = 0;

        // --- Computed ---
        const themeLabel = computed(() => isDark.value ? 'Passa al tema chiaro' : 'Passa al tema scuro');

        // --- Methods ---
        function openFilePicker() {
          if (fileInput.value) {
            fileInput.value.value = ''; // Reset so same file can be re-selected
            fileInput.value.click();
          }
        }

        function handleFileSelect(event) {
          const file = event.target.files[0];
          if (file) {
            processFile(file);
          }
        }

        function processFile(file) {
          errorMsg.value = null;

          if (!file.name.toLowerCase().endsWith('.json')) {
            errorMsg.value = 'Il file deve essere in formato JSON (.json)';
            return;
          }

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const json = JSON.parse(e.target.result);

              if (typeof json !== 'object' || json === null) {
                errorMsg.value = 'Il file JSON deve contenere un oggetto con chiavi e valori.';
                return;
              }

              const { nodes, links } = parseJSONToGraph(json);

              if (nodes.length === 0) {
                errorMsg.value = 'Nessun nodo trovato. Il JSON deve contenere almeno una proprietà con valore stringa o oggetto annidato.';
                return;
              }

              parsedNodes.value = nodes;
              parsedLinks.value = links;
              totalNodeCount.value = nodes.length;
              visibleNodeCount.value = nodes.length;
              fileName.value = file.name;
              fileLoaded.value = true;
              filterText.value = '';

              nextTick(() => {
                initGraph();
              });

            } catch (err) {
              errorMsg.value = 'Errore nel parsing del JSON: ' + err.message;
            }
          };
          reader.onerror = () => {
            errorMsg.value = 'Impossibile leggere il file. Verifica che non sia corrotto.';
          };
          reader.readAsText(file);
        }

        function initGraph() {
          if (graphManager) {
            graphManager.destroy();
          }
          if (!graphContainer.value) return;

          graphManager = new GraphManager(graphContainer.value);
          graphManager.init();
          graphManager.setData(parsedNodes.value, parsedLinks.value);

          // Auto zoom to fit after simulation settles
          setTimeout(() => {
            if (graphManager) graphManager.zoomToFit();
          }, 1500);
        }

        function applyFilter() {
          if (graphManager) {
            graphManager.applyFilter(filterText.value);
            updateVisibleCount();
          }
        }

        function updateVisibleCount() {
          if (!graphManager || !graphManager.nodeElements) {
            visibleNodeCount.value = totalNodeCount.value;
            return;
          }
          const filter = filterText.value.toLowerCase().trim();
          if (!filter) {
            visibleNodeCount.value = totalNodeCount.value;
          } else {
            let count = 0;
            graphManager.nodes.forEach(n => {
              if (n.label.toLowerCase().includes(filter)) count++;
            });
            visibleNodeCount.value = count;
          }
        }

        function resetZoom() {
          if (graphManager) graphManager.resetZoom();
        }

        function zoomToFit() {
          if (graphManager) graphManager.zoomToFit();
        }

        function toggleTheme() {
          isDark.value = !isDark.value;
          document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
          try {
            localStorage.setItem('dependency-lens-theme', isDark.value ? 'dark' : 'light');
          } catch(e) { /* ignore */ }
        }

        // --- Drag & Drop handlers ---
        function onDragEnter(e) {
          dragCounter++;
          isDragOver.value = true;
        }

        function onDragOver(e) {
          // needed to allow drop
        }

        function onDragLeave(e) {
          dragCounter--;
          if (dragCounter <= 0) {
            dragCounter = 0;
            isDragOver.value = false;
          }
        }

        function onDrop(e) {
          dragCounter = 0;
          isDragOver.value = false;
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            processFile(files[0]);
          }
        }

        // --- Keyboard shortcut for file open ---
        function onKeyDown(e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
            e.preventDefault();
            openFilePicker();
          }
        }

        // --- Lifecycle ---
        onMounted(() => {
          // Restore theme
          try {
            const saved = localStorage.getItem('dependency-lens-theme');
            if (saved === 'dark') {
              isDark.value = true;
              document.documentElement.setAttribute('data-theme', 'dark');
            }
          } catch(e) { /* ignore */ }

          document.addEventListener('keydown', onKeyDown);
        });

        onUnmounted(() => {
          if (graphManager) graphManager.destroy();
          document.removeEventListener('keydown', onKeyDown);
        });

        // Return everything to template
        return {
          // State
          fileLoaded,
          fileName,
          filterText,
          errorMsg,
          isDragOver,
          totalNodeCount,
          visibleNodeCount,
          isDark,
          // Refs
          fileInput,
          graphContainer,
          // Computed
          themeLabel,
          // Methods
          openFilePicker,
          handleFileSelect,
          applyFilter,
          resetZoom,
          zoomToFit,
          toggleTheme,
          onDragEnter,
          onDragOver,
          onDragLeave,
          onDrop,
        };
      }
    }).mount('#app');

  })();
  </script>
</body>
